<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stinkr 💕 Find Your Perfect Stench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────── Reset & Base ─────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #ff4d7d;
      --pink2:   #ff80aa;
      --rose:    #ff2d6e;
      --purple:  #c244d4;
      --lavender:#e8a0f5;
      --dark:    #1a0d1e;
      --darker:  #120910;
      --card-l:  #2a0d2e;
      --card-r:  #2e0d1a;
      --grad-l:  linear-gradient(160deg, #2a0d2e 0%, #1a0818 100%);
      --grad-r:  linear-gradient(160deg, #2e0d1a 0%, #180811 100%);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Arial', sans-serif;
      background: var(--dark);
      color: #fff;
      user-select: none;
    }

    /* ─────────────────── Particle canvas ─────────────────── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─────────────────── Header bar ─────────────────── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 20px;
      background: rgba(18,9,16,0.88);
      border-bottom: 1px solid rgba(255,77,125,0.35);
      backdrop-filter: blur(12px);
    }

    #header h1 {
      font-size: clamp(1.1rem, 4vw, 1.75rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--pink2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(255,77,125,0.55));
      flex-shrink: 0;
    }

    #champion-bar {
      font-size: clamp(0.62rem, 2vw, 0.84rem);
      color: var(--lavender);
      text-align: center;
      min-height: 1.2em;
      font-weight: 600;
      filter: drop-shadow(0 0 6px rgba(232,160,245,0.4));
    }

    /* ─────────────────── Arena ─────────────────── */
    #arena {
      position: fixed;
      inset: 0;
      top: 58px;
      bottom: 0;
      display: flex;
      gap: 0;
      padding: 16px 14px 14px;
      background: radial-gradient(ellipse at 50% 0%, rgba(194,68,212,0.12) 0%, transparent 70%);
    }

    /* ─────────────────── Arena columns ─────────────────── */
    .arena-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .arena-col:first-child { margin-right: 7px; }
    .arena-col:last-child  { margin-left: 7px; }

    /* ─────────────────── Profile cards ─────────────────── */
    .side {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #left-side  {
      background: var(--grad-l);
      border: 1.5px solid rgba(255,77,125,0.3);
    }
    #right-side {
      background: var(--grad-r);
      border: 1.5px solid rgba(194,68,212,0.3);
    }

    .side:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 16px 48px rgba(255,77,125,0.25);
    }
    #right-side:hover {
      box-shadow: 0 16px 48px rgba(194,68,212,0.25);
    }

    .side-glow {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      border-radius: 24px;
    }
    #left-side  .side-glow { background: radial-gradient(ellipse at center, rgba(255,77,125,0.2) 0%, transparent 70%); }
    #right-side .side-glow { background: radial-gradient(ellipse at center, rgba(194,68,212,0.22) 0%, transparent 70%); }
    .side:hover .side-glow  { opacity: 1; }
    .side.playing .side-glow { opacity: 1 !important; }

    /* Profile photo circle */
    .profile-ring {
      width: clamp(90px, 20vw, 150px);
      height: clamp(90px, 20vw, 150px);
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 3px solid rgba(255,77,125,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 24px rgba(255,77,125,0.3), inset 0 0 20px rgba(255,77,125,0.06);
      transition: box-shadow 0.2s;
      pointer-events: none;
    }
    #right-side .profile-ring {
      border-color: rgba(194,68,212,0.5);
      box-shadow: 0 0 24px rgba(194,68,212,0.3), inset 0 0 20px rgba(194,68,212,0.06);
    }
    .side.playing .profile-ring {
      box-shadow: 0 0 40px rgba(255,77,125,0.7), inset 0 0 20px rgba(255,77,125,0.1);
      animation: ringglow 0.45s ease-in-out;
    }
    #right-side.playing .profile-ring {
      box-shadow: 0 0 40px rgba(194,68,212,0.7), inset 0 0 20px rgba(194,68,212,0.1);
    }

    /* Fart cloud blob */
    .fart-blob {
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 1;
      pointer-events: none;
    }
    .side.playing .fart-blob {
      animation: fartjiggle 0.45s ease-in-out;
    }

    @keyframes fartjiggle {
      0%   { transform: scale(1)    rotate(0deg); }
      20%  { transform: scale(1.25) rotate(-6deg); }
      40%  { transform: scale(0.92) rotate(4deg); }
      60%  { transform: scale(1.15) rotate(-3deg); }
      80%  { transform: scale(0.97) rotate(2deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }

    @keyframes ringglow {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.1); }
      60%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .fart-name {
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 0 12px;
      pointer-events: none;
    }
    #left-side  .fart-name { color: var(--pink2); text-shadow: 0 0 14px rgba(255,128,170,0.6); }
    #right-side .fart-name { color: var(--lavender); text-shadow: 0 0 14px rgba(232,160,245,0.6); }

    .fart-subtitle {
      font-size: clamp(0.68rem, 1.6vw, 0.85rem);
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      pointer-events: none;
    }

    .play-status {
      font-size: clamp(0.7rem, 1.7vw, 0.9rem);
      font-weight: 600;
      margin-top: 10px;
      min-height: 1.3em;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #left-side  .play-status { color: var(--pink); }
    #right-side .play-status { color: var(--lavender); }

    /* Streak badge */
    .win-badge {
      display: none;
      position: absolute;
      top: 14px;
      background: linear-gradient(135deg, var(--rose), var(--purple));
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 99px;
      box-shadow: 0 2px 12px rgba(255,45,110,0.4);
    }
    #left-side  .win-badge { left: 14px; }
    #right-side .win-badge { right: 14px; }

    /* ─────────────────── VS divider ─────────────────── */
    #vs-divider {
      position: fixed;
      left: 50%;
      top: 58px;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    #vs-circle {
      width: clamp(44px, 7.5vw, 64px);
      height: clamp(44px, 7.5vw, 64px);
      border-radius: 50%;
      background: var(--darker);
      border: 2.5px solid rgba(255,77,125,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.1rem, 2.8vw, 1.5rem);
      color: var(--pink);
      box-shadow:
        0 0 20px rgba(255,77,125,0.45),
        0 0 50px rgba(255,77,125,0.15);
      animation: vspulse 2.4s ease-in-out infinite;
    }
    @keyframes vspulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,77,125,0.45), 0 0 50px rgba(255,77,125,0.15); }
      50%       { box-shadow: 0 0 32px rgba(255,77,125,0.8), 0 0 70px rgba(255,77,125,0.3); }
    }

    /* ─────────────────── Like buttons (below cards) ─────────────────── */
    .card-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 12px 0 16px;
    }

    .like-btn {
      width: clamp(56px, 14vw, 72px);
      height: clamp(56px, 14vw, 72px);
      border-radius: 50%;
      border: none;
      font-size: clamp(1.5rem, 4vw, 2rem);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1), filter 0.12s, box-shadow 0.12s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .like-btn:hover  { transform: scale(1.18); filter: brightness(1.15); }
    .like-btn:active { transform: scale(0.92); }

    #like-left  {
      background: linear-gradient(135deg, #c2185b, #e91e63, #ff4081);
      box-shadow: 0 4px 24px rgba(233,30,99,0.55);
    }
    #like-right {
      background: linear-gradient(135deg, #7b1fa2, #9c27b0, #ce93d8);
      box-shadow: 0 4px 24px rgba(156,39,176,0.55);
    }

    /* ─────────────────── Winner overlay ─────────────────── */
    #winner-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(12,4,15,0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      animation: fadein 0.3s ease;
      backdrop-filter: blur(6px);
    }
    #winner-overlay.show { display: flex; }

    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #winner-box {
      background: linear-gradient(160deg, #2a0d2e 0%, #1e0b28 100%);
      border: 2px solid rgba(255,77,125,0.6);
      border-radius: 28px;
      padding: 40px 52px;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,77,125,0.35), 0 0 140px rgba(194,68,212,0.15);
      animation: winpop 0.45s cubic-bezier(0.22,1.4,0.55,1);
      max-width: 90vw;
    }
    @keyframes winpop {
      from { transform: scale(0.55); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #winner-emoji { font-size: 5rem; line-height: 1; animation: heartbeat 0.8s ease-in-out 3; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.2); }
      60%       { transform: scale(0.95); }
    }

    #winner-label {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 10px;
    }
    #winner-name  {
      font-size: clamp(1.3rem, 4.5vw, 2.2rem);
      font-weight: 900;
      color: #fff;
      margin-top: 6px;
      text-shadow: 0 0 24px rgba(255,77,125,0.6);
    }
    #winner-wins  {
      font-size: clamp(0.75rem, 1.9vw, 0.95rem);
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      margin-top: 10px;
    }
    #next-btn {
      margin-top: 26px;
      padding: 15px 40px;
      background: linear-gradient(135deg, var(--rose), var(--purple));
      color: #fff;
      border: none;
      border-radius: 25px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: clamp(0.88rem, 2.3vw, 1.1rem);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 24px rgba(255,45,110,0.45);
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1), filter 0.12s;
    }
    #next-btn:hover  { transform: scale(1.07); filter: brightness(1.1); }
    #next-btn:active { transform: scale(0.96); }

    /* ─────────────────── Responsive tweaks ─────────────────── */
    @media (max-width: 480px) {
      #header h1 { font-size: 1.05rem; }
      .fart-blob  { font-size: 3.2rem; }
      .profile-ring { width: 80px; height: 80px; }
      #winner-box { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- Header -->
  <div id="header">
    <h1>💕 STINKR</h1>
    <div id="champion-bar">Loading the stench…</div>
  </div>

  <!-- Arena -->
  <div id="arena">

    <!-- Left Column -->
    <div class="arena-col">
      <div class="side" id="left-side" role="button" aria-label="Play left fart" tabindex="0">
        <div class="side-glow"></div>
        <span class="win-badge" id="left-badge">🔥 0 WINS</span>
        <div class="profile-ring">
          <div class="fart-blob" id="left-blob">💨</div>
        </div>
        <div class="fart-name" id="left-name">Loading…</div>
        <div class="fart-subtitle">Tap to sniff 👃</div>
        <div class="play-status" id="left-status"></div>
      </div>
      <div class="card-actions">
        <button class="like-btn" id="like-left" aria-label="Like left fart">❤️</button>
      </div>
    </div>

    <!-- Right Column -->
    <div class="arena-col">
      <div class="side" id="right-side" role="button" aria-label="Play right fart" tabindex="0">
        <div class="side-glow"></div>
        <span class="win-badge" id="right-badge">🔥 0 WINS</span>
        <div class="profile-ring">
          <div class="fart-blob" id="right-blob">💨</div>
        </div>
        <div class="fart-name" id="right-name">Loading…</div>
        <div class="fart-subtitle">Tap to sniff 👃</div>
        <div class="play-status" id="right-status"></div>
      </div>
      <div class="card-actions">
        <button class="like-btn" id="like-right" aria-label="Like right fart">❤️</button>
      </div>
    </div>

  </div>

  <!-- VS circle -->
  <div id="vs-divider">
    <div id="vs-circle">💘</div>
  </div>

  <!-- Winner overlay -->
  <div id="winner-overlay">
    <div id="winner-box">
      <div id="winner-emoji">💕</div>
      <div id="winner-label">✨ IT'S A MATCH! ✨</div>
      <div id="winner-name"></div>
      <div id="winner-wins"></div>
      <button id="next-btn" onclick="nextRound()">Keep Swiping 💨</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Fart catalogue ────────────────────────────────── */
    var FARTS = [
      { name: 'The Awful Awakening', file: 'assets/sounds/awful.mp3',                        emoji: '💀' },
      { name: 'Super Blast',         file: 'assets/sounds/super_blast.mp3',                  emoji: '💥' },
      { name: 'The Solid 6/10',      file: 'assets/sounds/6_of_10.mp3',                      emoji: '⭐' },
      { name: 'The Silent Killer',   file: 'assets/sounds/voice_09-03-2026_01-07-01.mp3',    emoji: '🤫' },
      { name: 'Rip #1',             file: 'assets/sounds/voice_28-03-2026_13-55-38.mp3',    emoji: '🌬️' },
      { name: 'Rip #2',             file: 'assets/sounds/voice_28-03-2026_13-59-31.mp3',    emoji: '🤢' },
      { name: 'Rip #3',             file: 'assets/sounds/voice_28-03-2026_14-05-59.mp3',    emoji: '🤮' },
    ];

    /* ── State ─────────────────────────────────────────── */
    var champion = null;   // { fart, wins } or null first round
    var leftFart  = null;
    var rightFart = null;
    var audios    = { left: null, right: null };

    /* ── DOM refs ─────────────────────────────────────── */
    var leftSide  = document.getElementById('left-side');
    var rightSide = document.getElementById('right-side');
    var leftBlob  = document.getElementById('left-blob');
    var rightBlob = document.getElementById('right-blob');
    var leftName  = document.getElementById('left-name');
    var rightName = document.getElementById('right-name');
    var leftStatus  = document.getElementById('left-status');
    var rightStatus = document.getElementById('right-status');
    var leftBadge   = document.getElementById('left-badge');
    var rightBadge  = document.getElementById('right-badge');
    var champBar    = document.getElementById('champion-bar');
    var overlay     = document.getElementById('winner-overlay');
    var winnerName  = document.getElementById('winner-name');
    var winnerWins  = document.getElementById('winner-wins');
    var winnerEmoji = document.getElementById('winner-emoji');

    /* ── Helpers ─────────────────────────────────────── */
    function pickRandom(exclude) {
      var pool = FARTS.filter(function (f) { return f !== exclude; });
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function loadAudio(side, fart) {
      if (audios[side]) {
        audios[side].pause();
        audios[side].src = '';
      }
      var a = new Audio(fart.file);
      a.preload = 'auto';
      audios[side] = a;
    }

    function playAudio(side) {
      var a = audios[side];
      if (!a) return;
      a.currentTime = 0;
      a.play().catch(function () {/* autoplay guard – user clicked, should be fine */});
    }

    function triggerJiggle(side) {
      var el = side === 'left' ? leftSide : rightSide;
      el.classList.remove('playing');
      void el.offsetWidth; // force reflow to restart animation
      el.classList.add('playing');
      setTimeout(function () { el.classList.remove('playing'); }, 500);
    }

    function updateChampBar() {
      if (!champion) {
        champBar.textContent = '💕 Who will steal your heart (and nose)?';
      } else {
        champBar.textContent =
          '🔥 Hottest Stench: ' + champion.fart.name +
          ' — ' + champion.wins + ' match' + (champion.wins === 1 ? '' : 'es');
      }
    }

    /* ── Round setup ─────────────────────────────────── */
    function setupRound() {
      var champ = champion ? champion.fart : null;
      var challenger = pickRandom(champ);

      // Champion goes on a random side each round
      var champSide = champ ? (Math.random() < 0.5 ? 'left' : 'right') : null;

      if (champ && champSide === 'left') {
        leftFart  = champ;
        rightFart = challenger;
      } else if (champ) {
        leftFart  = challenger;
        rightFart = champ;
      } else {
        // First round: two random farts
        leftFart  = pickRandom(null);
        rightFart = pickRandom(leftFart);
      }

      // Update DOM
      leftBlob.textContent  = leftFart.emoji;
      rightBlob.textContent = rightFart.emoji;
      leftName.textContent  = leftFart.name;
      rightName.textContent = rightFart.name;
      leftStatus.textContent  = '';
      rightStatus.textContent = '';

      // Show/hide champion badge
      if (champ) {
        var champIsLeft = leftFart === champ;
        if (champIsLeft) {
          leftBadge.textContent  = '🔥 ' + champion.wins + ' WIN' + (champion.wins === 1 ? '' : 'S');
          leftBadge.style.display  = 'inline-block';
          rightBadge.style.display = 'none';
        } else {
          rightBadge.textContent = '🔥 ' + champion.wins + ' WIN' + (champion.wins === 1 ? '' : 'S');
          rightBadge.style.display  = 'inline-block';
          leftBadge.style.display   = 'none';
        }
      } else {
        leftBadge.style.display  = 'none';
        rightBadge.style.display = 'none';
      }

      // Preload audio
      loadAudio('left',  leftFart);
      loadAudio('right', rightFart);

      updateChampBar();
    }

    /* ── Click handlers ──────────────────────────────── */
    function handleSideClick(side) {
      var status = side === 'left' ? leftStatus : rightStatus;
      playAudio(side);
      triggerJiggle(side);
      status.textContent = '💨 *pfffft*';
      setTimeout(function () {
        if (status.textContent === '💨 *pfffft*') status.textContent = '▶ Tap again to replay';
      }, 1800);
    }

    leftSide.addEventListener('click',   function () { handleSideClick('left'); });
    rightSide.addEventListener('click',  function () { handleSideClick('right'); });
    leftSide.addEventListener('keydown',  function (e) { if (e.key === 'Enter' || e.key === ' ') handleSideClick('left'); });
    rightSide.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') handleSideClick('right'); });

    document.getElementById('like-left').addEventListener('click', function (e) {
      e.stopPropagation();
      castVote('left');
    });
    document.getElementById('like-right').addEventListener('click', function (e) {
      e.stopPropagation();
      castVote('right');
    });

    /* ── Voting ──────────────────────────────────────── */
    window.castVote = function (side) {
      var winner = side === 'left' ? leftFart : rightFart;

      // Stop both audio
      if (audios.left)  { audios.left.pause();  audios.left.currentTime  = 0; }
      if (audios.right) { audios.right.pause(); audios.right.currentTime = 0; }

      // Update champion
      if (champion && champion.fart === winner) {
        champion.wins += 1;
      } else {
        champion = { fart: winner, wins: 1 };
      }

      // Show overlay
      winnerEmoji.textContent = winner.emoji;
      winnerName.textContent  = winner.name;
      winnerWins.textContent  =
        champion.wins === 1
          ? '💕 First match — your stench is irresistible!'
          : '💕 ' + champion.wins + ' matches and counting — you\'re a catch!';

      overlay.classList.add('show');
    };

    /* ── Next round ──────────────────────────────────── */
    window.nextRound = function () {
      overlay.classList.remove('show');
      setupRound();
    };

    /* ── Particle system (floating hearts) ──────────────── */
    (function initParticles() {
      var canvas = document.getElementById('particles');
      var ctx    = canvas.getContext('2d');
      var W, H;
      var particles = [];
      var HEARTS = ['❤️','💕','💗','💖','💓','💘','✨'];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function rand(min, max) { return min + Math.random() * (max - min); }

      function spawnParticle() {
        return {
          x:       rand(W * 0.05, W * 0.95),
          y:       H + rand(10, 40),
          size:    rand(10, 26),
          vx:      rand(-0.5, 0.5),
          vy:      rand(-0.5, -1.4),
          life:    0,
          maxLife: rand(150, 300),
          heart:   HEARTS[Math.floor(Math.random() * HEARTS.length)],
          wobble:  rand(0, Math.PI * 2),
          wobbleSpeed: rand(0.02, 0.06),
        };
      }

      for (var i = 0; i < 22; i++) {
        var p = spawnParticle();
        p.life = Math.floor(Math.random() * p.maxLife);
        p.y    = rand(0, H);
        particles.push(p);
      }

      function frame() {
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.life++;
          p.wobble += p.wobbleSpeed;
          p.x += p.vx + Math.sin(p.wobble) * 0.4;
          p.y += p.vy;

          if (p.life >= p.maxLife || p.y < -40) {
            particles[i] = spawnParticle();
            continue;
          }

          var alpha = Math.min(1, (1 - p.life / p.maxLife) * 2);
          ctx.globalAlpha = alpha * 0.55;
          ctx.font = p.size + 'px serif';
          ctx.textAlign = 'center';
          ctx.fillText(p.heart, p.x, p.y);
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();

    /* ── Boot ────────────────────────────────────────── */
    setupRound();

  })();
  </script>
